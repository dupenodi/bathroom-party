<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bathroom Party</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      background: #0c0c0a;
      color: #c8c3b8;
      font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 12px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .head {
      padding: 14px 16px 10px;
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #e6e0d4;
    }

    .logo em {
      font-style: normal;
      color: #c9a84c;
    }

    /* ── Meter ── */
    .meter {
      margin: 0 16px;
      padding: 12px 14px;
      background: #10100e;
      border: 1px solid #1c1c16;
      border-radius: 6px;
      transition: border-color 0.25s, background 0.25s;
    }

    .meter.on {
      border-color: #c9a84c33;
      background: #12100c;
    }

    .bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 36px;
    }

    .bar {
      flex: 1;
      min-width: 0;
      background: #1a1a16;
      border-radius: 1px;
      min-height: 2px;
      transition: background 0.12s;
    }

    .meter.on .bar { background: #2a2820; }

    .meter.on.live .bar {
      background: #c9a84c;
      box-shadow: 0 0 4px #c9a84c44;
    }

    .meter.on.idle .bar {
      animation: breathe 1.4s ease-in-out infinite alternate;
    }

    .meter.on.idle .bar:nth-child(odd)  { animation-duration: 1.1s; }
    .meter.on.idle .bar:nth-child(3n)   { animation-duration: 1.6s; }

    @keyframes breathe {
      from { opacity: 0.35; }
      to   { opacity: 0.75; }
    }

    .meter-label {
      margin-top: 8px;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #3a3a34;
    }

    .meter.on .meter-label { color: #c9a84c66; }

    /* ── Presets ── */
    .presets {
      padding: 12px 16px 0;
    }

    .preset-row {
      display: flex;
      gap: 5px;
    }

    .preset {
      flex: 1;
      background: transparent;
      border: 1px solid #222218;
      color: #6a6a5e;
      font-family: inherit;
      font-size: 10px;
      font-weight: 500;
      padding: 6px 4px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }

    .preset:hover { color: #c9a84c; border-color: #c9a84c44; }

    .preset.selected {
      color: #0c0c0a;
      background: #c9a84c;
      border-color: #c9a84c;
    }

    /* ── Power row ── */
    .power {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid #1a1a16;
    }

    .power-copy { flex: 1; min-width: 0; }

    .power-status {
      font-size: 11px;
      font-weight: 500;
      color: #5a5a50;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .power-status.on  { color: #c9a84c; }
    .power-status.err { color: #b86a5a; }

    .toggle {
      flex-shrink: 0;
      width: 44px;
      height: 24px;
      background: #1a1a16;
      border: 1px solid #2a2a22;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }

    .toggle::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      top: 2px;
      left: 2px;
      background: #4a4a42;
      border-radius: 50%;
      transition: transform 0.2s cubic-bezier(0.4,0,0.2,1), background 0.2s;
    }

    .toggle.on {
      background: #1e1a10;
      border-color: #c9a84c55;
    }

    .toggle.on::after {
      transform: translateX(20px);
      background: #c9a84c;
    }

    .toggle.loading {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ── Sliders ── */
    .sliders {
      padding: 14px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .slider-name {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #5a5a50;
    }

    .slider-hint {
      font-size: 9px;
      color: #3a3a34;
    }

    .slider-val {
      font-size: 10px;
      color: #5a5a50;
      font-variant-numeric: tabular-nums;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 2px;
      outline: none;
      cursor: pointer;
      border-radius: 1px;
      background: linear-gradient(
        to right,
        #c9a84c44 0%,
        #c9a84c44 var(--fill, 50%),
        #1e1e18 var(--fill, 50%),
        #1e1e18 100%
      );
    }

    input[type=range].live {
      background: linear-gradient(
        to right,
        #c9a84c66 0%,
        #c9a84c66 var(--fill, 50%),
        #1e1e18 var(--fill, 50%),
        #1e1e18 100%
      );
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: #3a3a34;
      border: 1.5px solid #5a5a50;
      border-radius: 50%;
      transition: background 0.12s, border-color 0.12s;
    }

    input[type=range]:hover::-webkit-slider-thumb,
    input[type=range]:active::-webkit-slider-thumb {
      background: #c9a84c;
      border-color: #c9a84c;
    }

    /* ── Footer row ── */
    .foot-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 12px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }

    .remember-box {
      width: 11px;
      height: 11px;
      border: 1px solid #2a2a22;
      border-radius: 2px;
      transition: background 0.12s, border-color 0.12s;
    }

    .remember.on .remember-box {
      background: #c9a84c;
      border-color: #c9a84c;
    }

    .remember-text {
      font-size: 9px;
      color: #4a4a42;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .remember.on .remember-text { color: #c9a84c; }

    .reset-btn {
      width: 24px;
      height: 24px;
      padding: 0;
      background: none;
      border: 1px solid #2a2a22;
      border-radius: 4px;
      color: #5a5a50;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .reset-btn svg {
      width: 12px;
      height: 12px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .reset-btn:hover { color: #c9a84c; border-color: #c9a84c44; }

    .reset-btn:disabled {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-top: 1px solid #1a1a16;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #2a2a22;
      flex-shrink: 0;
    }

    .status-dot.on {
      background: #c9a84c;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    .status-text {
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #3a3a34;
    }

    .status-text.on { color: #c9a84c55; }
  </style>
</head>
<body>

  <header class="head">
    <span class="logo">bath<em>room</em> party</span>
  </header>

  <section class="meter" id="meter">
    <div class="bars" id="bars">
      <div class="bar" style="height:3px"></div>
      <div class="bar" style="height:8px"></div>
      <div class="bar" style="height:5px"></div>
      <div class="bar" style="height:12px"></div>
      <div class="bar" style="height:7px"></div>
      <div class="bar" style="height:10px"></div>
      <div class="bar" style="height:6px"></div>
      <div class="bar" style="height:9px"></div>
      <div class="bar" style="height:4px"></div>
    </div>
    <div class="meter-label" id="vizStatus">no signal</div>
  </section>

  <section class="presets" id="presets"></section>

  <section class="power">
    <div class="power-copy">
      <div class="power-status" id="powerSub">off</div>
    </div>
    <button class="toggle" id="toggle" type="button" role="switch" aria-checked="false" aria-label="Toggle effect"></button>
  </section>

  <section class="sliders" id="sliders">
    <div class="slider-row">
      <div class="slider-meta">
        <div>
          <span class="slider-name" id="depthName">Depth</span>
          <span class="slider-hint" id="depthHint"> — how far in</span>
        </div>
        <span class="slider-val" id="depthVal">50%</span>
      </div>
      <input type="range" id="depthSlider" min="0" max="100" value="50">
    </div>

    <div class="slider-row">
      <div class="slider-meta">
        <div>
          <span class="slider-name" id="muffleName">Muffle</span>
          <span class="slider-hint" id="muffleHint"> — wall thickness</span>
        </div>
        <span class="slider-val" id="muffleVal">50%</span>
      </div>
      <input type="range" id="muffleSlider" min="0" max="100" value="50">
    </div>

    <div class="slider-row">
      <div class="slider-meta">
        <div>
          <span class="slider-name" id="bassName">Bass</span>
          <span class="slider-hint" id="bassHint"> — thump through walls</span>
        </div>
        <span class="slider-val" id="bassVal">50%</span>
      </div>
      <input type="range" id="bassSlider" min="0" max="100" value="50">
    </div>
  </section>

  <div class="foot-row">
    <div class="remember" id="rememberToggle" title="Remember settings for this site">
      <div class="remember-box"></div>
      <span class="remember-text" id="rememberText">save for this site</span>
    </div>
    <button class="reset-btn" id="resetBtn" type="button" title="Reset sliders" aria-label="Reset sliders to preset defaults" disabled>
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 12a9 9 0 1 0 2.5-6.2"/>
        <polyline points="3 4 3 9 8 9"/>
      </svg>
    </button>
  </div>

  <footer class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="footerText">idle</span>
  </footer>

  <script src="presets.js"></script>
  <script src="popup.js"></script>
</body>
</html>
